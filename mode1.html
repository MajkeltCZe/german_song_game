    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

  <body>
      

    <header class=" container jumbotron  rounded-rounded game-container">
      <h1> Stampf und Klatsch Spiel</h1>

    </header>
<main class="mt-5 p-5 bg-white container   justify-content-center align-intems-center game-container">
  <div class="row w-100 h-100 p-5 justify-content-center">
    
    <div class="col-6 col-sm-6 col-md-4 d-flex justify-content-center mb-3 mb-sm-0">
       <a href="#"> <button class="btn btn-primary btn-lg mode-btn">Tančící mód</button></a>
</div>

    <div class="col-6 col-sm-6 col-md-4 d-flex justify-content-center">
       <a href="mode2.html"> <button class="btn btn-success btn-lg mode-btn">Cvičící mód</button></a>
    </div>
</div>


<div class="row d-flex justify-content-center">
 <div class="col-md-12">
  <audio id="song">
  <source src="media/song.wav" type="audio/mpeg">
</audio>
<div class="lyrics-wrapper">
<div id="lyrics-div" class=></div>
</div>  
</div>
</div>
    <div class="row  text-center justify-content-center d-flex ">
      <div class="col-md-12">
     <input type="range" id="progress" value="0">
     </div>
     </div>
     
<div class="row d-flex justify-content-center">
  <div class="col-md-7 d-flex align-items-center">
    <button id="playBtn" class="mr-2">▶</button>
    <div class="volume-container d-flex align-items-center position-relative">
      <span id="volumeIcon">🔊</span>
      <input type="range" id="volume" min="0" max="1" step="0.1" class="hidden-volume">
    </div>
  </div>
</div>
</main>


<script src="js/lyrics.js"></script>
<script src="js/main.js"></script>
