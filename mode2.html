<!doctype html>
<html lang="cz">
  <head>
    <title>Spiel</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  

    
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
      

    <header class=" container jumbotron  rounded-rounded game-container">
      <h1> Stampf und Klatsch Spiel</h1>

    </header>
<main class="mt-5 p-5 bg-white container justify-content-center align-intems-center game-container">
 <div class="row w-100 h-100">
  <div class="col-4 d-flex align-items-center gap-2">
    
    <a href="index.html" title="domovská stránka">
      <i class="bi bi-house-door-fill"></i>
    </a>
    <span id="volumeIcon" title="nastavení hlasitosti">
      <i class="bi bi-volume-down"></i>
    </span>
    <input type="range" id="volume" min="0" max="1" step="0.1" class="hidden-volume">

  </div>
</div>
<div class="row d-flex justify-content-center">
 <div class="col-md-12">
  <audio id="song">
  <source src="media/song.wav" type="audio/mpeg">
</audio>
<div class="lyrics-wrapper">
  <button id="restart" class="btn btn-success btn-lg"> ▶ Hrát </button>
  <div id="lyrics-div" class="hidden"></div>
  <div id="final-score" class="hidden"></div>
</div> 
</div>
</div>
<div class="row d-flex justify-content-center">
  <div class="col-md-7 d-flex align-items-center">
  </div>
</div>
<div class="row w-100 h-100 p-5 justify-content-center">
    <div class="col-12 col-sm-6 col-md-4 d-flex justify-content-center mb-3 mb-sm-0">
     <div id="buttons" class="hidden">
      <button class="btn btn-primary btn-lg mode-btn gap-2" id="stampf">Stampf</button>
     <button class="btn btn-primary btn-lg mode-btn" id="klatsch">Klatsch</button>
   </div>
    </div>
    </div>
</main>


<script src="js/lyrics.js"></script>
<script src="js/game.js"></script>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
  
  </body>
</html>
