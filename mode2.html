<!doctype html>
<html lang="cz">
  <head>
    <title>Spiel</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  

    
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
      

    <header class=" container jumbotron  rounded-rounded game-container">
      <h1> Stampf und Klatsch Spiel</h1>

    </header>
<main class="mt-5 p-5 bg-white container justify-content-center align-intems-center game-container">
 <div class="row w-100 h-100">
  <div class="col-4 d-flex align-items-center gap-2">
    
    <a href="index.html" title="domovská stránka">
      <i class="bi bi-house-door-fill"></i>
    </a>
    <span id="volumeIcon" title="nastavení hlasitosti" class="hidden">
      <i class="bi bi-volume-down"></i>
    </span>
    <input type="range" id="volume" min="0" max="1" step="0.1" class="hidden-volume">

  </div>
</div>
<div id="difficulty">
<div class="row w-100 p-3 justify-content-center">
  <div class="col-12 col-md-4 d-flex flex-column align-items-center mb-4">
    <button class="btn btn-success mode-btn mb-2" id="easy">   Jednoduchá  </button>
    <p class="text-center">   Úkolem je zmáčknout včas jen některé "Stampf" / "Klatsch". Písnička hraje pomaleji.  </p>
  </div>
  <div class="col-12 col-md-4 d-flex flex-column align-items-center mb-4">
    <button class="btn btn-primary mode-btn mb-2" id="hard">      Obtížnější  </button>
    <p class="text-center"> Úkolem je zmáčknout včas každé "Stampf" / "Klatsch".</p>
  </div>

</div>
<hr>
</div>
<div class="row d-flex justify-content-center">
 <div class="col-md-12">
  <audio id="song">
  <source src="media/song.wav" type="audio/mpeg">
</audio>
<div class="lyrics-wrapper">
  <button id="restart" class="btn btn-success btn-lg hidden"> ▶ Hrát </button>
  <div id="lyrics-div" class="hidden"></div>
  <div id="final-score" class="hidden"></div>
</div> 
</div>
</div>
<div class="row d-flex justify-content-center">
  <div class="col-md-7 d-flex align-items-center">
  </div>
</div>
<div class="row w-100 h-100 p-5 justify-content-center">
    <div class="col-12 col-sm-12 col-md-4 d-flex justify-content-center mb-3 mb-sm-0">
  <div id="buttons" class="d-flex gap-2 hidden">
  <button class="btn btn-primary btn-lg mode-btn d-flex align-items-center mr-3" id="stampf"> <img src="media/stampf_icon.png" alt="stampf" class="btn-icon"> <span>Stampf</span> </button>

  <button class="btn btn-primary btn-lg mode-btn d-flex align-items-center" id="klatsch">
    <img src="media/klatsch_icon.png" alt="klatsch" class="btn-icon"> <span>Klatsch</span> </button>
  </div>
    </div>
    </div>
</main>


<script src="js/lyrics.js"></script>
<script src="js/game.js"></script>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
  
  </body>
</html>
